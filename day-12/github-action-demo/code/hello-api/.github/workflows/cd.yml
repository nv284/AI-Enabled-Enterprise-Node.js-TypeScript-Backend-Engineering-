name: CD - Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual "re-run" and rollback from the Actions tab

# Only one deploy at a time; do NOT cancel a running deploy.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build page
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: training/code/hello-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: training/code/hello-api/package-lock.json

      - name: Install
        run: npm ci

      - name: Build API (tsc)
        run: npm run build

      - name: Generate landing page
        env:
          APP_VERSION: ${{ github.run_number }}
          GIT_SHA: ${{ github.sha }}
          BUILD_TIME: ${{ github.event.head_commit.timestamp }}
          GREETING: ${{ secrets.GREETING || 'Hello' }}
        run: npm run page:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: training/code/hello-api/public

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
